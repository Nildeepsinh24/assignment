<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Profile Card</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Minor custom tweaks to exactly match the requested image styling */
        .profile-card {
            width: 250px;
            border: none;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .profile-card .card-body {
            background-color: #f8f9fa;
            /* slightly greyish bottom */
            padding: 1.5rem 1.25rem;
        }

        /* Styling the placeholder image wrapper */
        .img-wrapper {
            background-color: #e2e2e2;
            padding-top: 20px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        /* Recreating the flat-art avatar from CSS shapes */
        .mock-avatar {
            width: 120px;
            height: 160px;
            margin: 0 auto;
            position: relative;
        }

        /* Head */
        .mock-avatar::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 90px;
            background-color: #e1b399;
            /* Skin tone */
            border-radius: 40% 40% 45% 45%;
            z-index: 2;
        }

        /* Hair */
        .mock-avatar::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 74px;
            height: 40px;
            background-color: #b5651d;
            /* Hair color */
            border-radius: 20px 20px 0 0;
            z-index: 3;
        }

        /* Suit Shoulders */
        .suit-shoulders {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 60px;
            background-color: #1a1a2e;
            /* Dark Suit */
            border-radius: 50% 50% 0 0;
            z-index: 4;
        }

        /* White Shirt & Tie collar */
        .suit-shoulders::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid white;
            z-index: 5;
        }

        /* Red Tie */
        .suit-shoulders::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 40px;
            background-color: #8b0000;
            z-index: 6;
        }
    </style>
</head>

<body>

    <!-- Using standard Bootstrap Card classes -->
    <div class="card profile-card">
        <!-- Top Half (Image placeholder) -->
        <div class="img-wrapper">
            <!-- Simulated flat HTML/CSS avatar matching the image -->
            <div class="mock-avatar">
                <div class="suit-shoulders"></div>
            </div>
        </div>

        <!-- Bottom Half (Details) -->
        <div class="card-body">
            <h5 class="card-title fw-bold text-dark fs-6 mb-1">Nildeepsinh Jadeja</h5>
            <p class="card-text text-muted mb-3" style="font-size: 0.75rem;">Software Developer</p>
            <a href="#" class="btn btn-primary btn-sm rounded-1 px-3 py-1 fw-semibold" style="font-size: 0.8rem;">See
                Profile</a>
        </div>
    </div>

</body>

</html>
