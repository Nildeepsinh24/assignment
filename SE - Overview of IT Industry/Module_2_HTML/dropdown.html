<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-arrow-left-circle me-2"></i> Back to Dashboard</a>
            <span class="navbar-text text-white fw-bold">Dropdown Selection</span>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center mt-4">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="mb-4 text-center text-primary fw-bold">Select a Course</h3>
                        <form>
                            <div class="mb-3">
                                <label for="course" class="form-label fw-semibold text-secondary">Course
                                    Selection</label>
                                <select id="course" name="course" class="form-select form-select-lg cursor-pointer">
                                    <option value="" selected disabled>Choose your path...</option>
                                    <option value="B.Tech">Bachelor of Technology (B.Tech)</option>
                                    <option value="BE">Bachelor of Engineering (BE)</option>
                                    <option value="BCA">Bachelor of Computer Applications (BCA)</option>
                                    <option value="MCA">Master of Computer Applications (MCA)</option>
                                    <option value="BSc">Bachelor of Science (IT)</option>
                                </select>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="button" class="btn btn-primary btn-lg rounded-pill shadow-sm">Proceed to
                                    Enroll</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
