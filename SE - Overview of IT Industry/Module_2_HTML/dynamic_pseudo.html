<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Pseudo Classes</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* Document Specific Pseudo Classes */
        /* :focus pseudo-class */
        .custom-input {
            padding: 12px 15px;
            font-size: 16px;
            border: 2px solid #ced4da;
            outline: none;
            transition: all 0.3s ease;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }

        .custom-input:focus {
            border-color: #198754;
            /* Bootstrap Success */
            background-color: #f8fff9;
            box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
        }

        /* :hover pseudo-class */
        .interactive-box {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.4s, border-radius 0.4s;
            cursor: pointer;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .interactive-box:hover {
            transform: scale(1.1) rotate(5deg);
            background: linear-gradient(135deg, #dc3545, #fd7e14);
            border-radius: 50%;
            box-shadow: 0 15px 30px rgba(220, 53, 69, 0.3);
        }
    </style>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-arrow-left-circle me-2"></i> Dashboard</a>
            <span class="navbar-text text-white fw-bold">Dynamic Pseudo Classes</span>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row">
            <div class="col-12 text-center mb-5">
                <h1 class="display-5 fw-bold text-dark">Dynamic Pseudo Classes in CSS</h1>
            </div>
        </div>

        <div class="row g-5 justify-content-center">
            <!-- Focus Demo -->
            <div class="col-md-5">
                <div class="card shadow-sm border-0 rounded-4 h-100">
                    <div class="card-body p-4 text-center">
                        <h3 class="fw-bold mb-4 text-success"><i class="bi bi-cursor-text me-2"></i><code>:focus</code>
                            State</h3>
                        <div class="mb-4">
                            <label for="name" class="form-label text-muted fw-semibold">Click the input to see focus
                                state:</label><br>
                            <input type="text" id="name" class="custom-input mx-auto" placeholder="Click to focus...">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hover Demo -->
            <div class="col-md-5">
                <div class="card shadow-sm border-0 rounded-4 h-100">
                    <div class="card-body p-4 d-flex flex-column align-items-center">
                        <h3 class="fw-bold mb-4 text-danger"><i class="bi bi-mouse2 me-2"></i><code>:hover</code> State
                        </h3>
                        <p class="text-muted fw-semibold mb-3">Hover over the box to see transition:</p>
                        <div class="interactive-box">
                            Hover Over Me!
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
