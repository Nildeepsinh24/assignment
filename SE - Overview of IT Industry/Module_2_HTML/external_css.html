<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External CSS Example</title>
    <!-- Bootstrap CSS for layout only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Link to the external CSS file (Custom Styles) -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Layout container handled by bootstrap, contents styled by style.css -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary mb-3 shadow-sm"
        style="margin: -40px -40px 40px -40px;">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="index.html"><i class="bi bi-arrow-left-circle me-2"></i> Back</a>
            <span class="navbar-text text-white fw-bold">External CSS Assignment</span>
        </div>
    </nav>

    <div class="container-content">
        <h1>Welcome to External CSS</h1>
        <p>This page uses an external stylesheet for its design rules. Separating content (HTML) from presentation (CSS)
            is the best practice for web development.</p>

        <div class="custom-card">
            <h3>External Style Card</h3>
            <p>This component is styled entirely from <code>style.css</code>.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
