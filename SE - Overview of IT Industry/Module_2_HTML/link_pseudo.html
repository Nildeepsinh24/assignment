<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Pseudo Classes</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="link_pseudo.css">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-arrow-left-circle me-2"></i> Dashboard</a>
            <span class="navbar-text text-white fw-bold">Link Pseudo Classes</span>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-5">
                        <h2 class="fw-bold mb-4 text-dark border-bottom pb-2">Link Pseudo-classes Demonstration</h2>
                        <p class="text-muted mb-4 fs-5">Check the styles of these links in different states:</p>

                        <ul class="list-group list-group-flush mb-4">
                            <li class="list-group-item bg-transparent border-0 py-3">
                                <i class="bi bi-link-45deg me-2 text-primary"></i>
                                <a class="nav-link-custom" href="https://www.example.com" target="_blank">A standard
                                    link (unvisited, visited, hover, active)</a>
                            </li>
                            <li class="list-group-item bg-transparent border-0 py-3">
                                <i class="bi bi-link me-2 text-primary"></i>
                                <a class="nav-link-custom" href="#section2">An internal link</a>
                            </li>
                        </ul>

                        <div class="alert alert-info mt-4" role="alert">
                            <i class="bi bi-info-circle-fill me-2"></i> <strong>Note:</strong> Visited links may appear
                            different if you've already clicked them previously.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
