<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React JS Assignments - Login & Registration</title>
    <!-- We will use Bootstrap for a clean, modern look quickly -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .auth-card:hover {
            transform: translateY(-5px);
        }

        .nav-pills .nav-link {
            color: #495057;
            font-weight: 500;
            border-radius: 10px;
        }

        .nav-pills .nav-link.active {
            background-color: #667eea;
            color: white;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #667eea;
        }

        .btn-primary {
            background-color: #667eea;
            border-color: #667eea;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: #5a6cd6;
            border-color: #5a6cd6;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }

        .social-btn {
            background: white;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: #333;
            transition: all 0.2s;
            text-decoration: none;
        }

        .social-btn:hover {
            background: #f8f9fa;
            color: #667eea;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card p-4 p-md-5">

                    <h3 class="text-center fw-bold mb-4" style="color: #4a4a4a;">Welcome</h3>

                    <!-- Nav Tabs -->
                    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active w-100" id="pills-login-tab" data-bs-toggle="pill"
                                data-bs-target="#pills-login" type="button" role="tab" aria-controls="pills-login"
                                aria-selected="true">Login</button>
                        </li>
                        <li class="nav-item ms-2" role="presentation">
                            <button class="nav-link w-100" id="pills-register-tab" data-bs-toggle="pill"
                                data-bs-target="#pills-register" type="button" role="tab" aria-controls="pills-register"
                                aria-selected="false">Register</button>
                        </li>
                    </ul>

                    <!-- Tab Content -->
                    <div class="tab-content" id="pills-tabContent">

                        <!-- Login Form -->
                        <div class="tab-pane fade show active" id="pills-login" role="tabpanel"
                            aria-labelledby="pills-login-tab">
                            <form>
                                <!-- Email input -->
                                <div class="form-floating mb-4">
                                    <input type="email" id="loginEmail" class="form-control"
                                        placeholder="Email address" />
                                    <label class="form-label" for="loginEmail">Email address</label>
                                </div>

                                <!-- Password input -->
                                <div class="form-floating mb-4">
                                    <input type="password" id="loginPassword" class="form-control"
                                        placeholder="Password" />
                                    <label class="form-label" for="loginPassword">Password</label>
                                </div>

                                <div class="row mb-4">
                                    <!-- Checkbox -->
                                    <div class="col-md-6 d-flex justify-content-center justify-content-md-start">
                                        <div class="form-check mb-3 mb-md-0">
                                            <input class="form-check-input" type="checkbox" value="" id="loginCheck"
                                                checked />
                                            <label class="form-check-label text-muted fs-6" for="loginCheck"> Remember
                                                me </label>
                                        </div>
                                    </div>

                                    <div class="col-md-6 d-flex justify-content-center justify-content-md-end">
                                        <a href="#!" class="text-decoration-none text-muted fs-6">Forgot password?</a>
                                    </div>
                                </div>

                                <!-- Submit button -->
                                <button type="submit" class="btn btn-primary w-100 py-2 mb-4">Sign In</button>

                                <!-- Register Link -->
                                <div class="text-center text-muted">
                                    <p>Not a member? <a href="#!" class="text-decoration-none text-primary"
                                            onclick="document.getElementById('pills-register-tab').click()">Register
                                            here</a></p>
                                </div>
                            </form>
                        </div>

                        <!-- Register Form -->
                        <div class="tab-pane fade" id="pills-register" role="tabpanel"
                            aria-labelledby="pills-register-tab">
                            <form>
                                <!-- Name input -->
                                <div class="form-floating mb-4">
                                    <input type="text" id="registerName" class="form-control" placeholder="Full Name" />
                                    <label class="form-label" for="registerName">Full Name</label>
                                </div>

                                <!-- Email input -->
                                <div class="form-floating mb-4">
                                    <input type="email" id="registerEmail" class="form-control"
                                        placeholder="Email address" />
                                    <label class="form-label" for="registerEmail">Email address</label>
                                </div>

                                <!-- Password input -->
                                <div class="form-floating mb-4">
                                    <input type="password" id="registerPassword" class="form-control"
                                        placeholder="Password" />
                                    <label class="form-label" for="registerPassword">Password</label>
                                </div>

                                <!-- Repeat Password input -->
                                <div class="form-floating mb-4">
                                    <input type="password" id="registerRepeatPassword" class="form-control"
                                        placeholder="Repeat password" />
                                    <label class="form-label" for="registerRepeatPassword">Repeat password</label>
                                </div>

                                <div class="form-check d-flex justify-content-center mb-4">
                                    <input class="form-check-input me-2" type="checkbox" value="" id="registerCheck"
                                        checked />
                                    <label class="form-check-label text-muted fs-6" for="registerCheck">
                                        I have read and agree to the terms
                                    </label>
                                </div>

                                <!-- Submit button -->
                                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign Up</button>
                            </form>
                        </div>
                    </div>

                    <div class="text-center mt-3">
                        <p class="text-muted small mb-3">or continue with</p>
                        <div class="d-flex justify-content-center gap-3">
                            <a href="#!" class="social-btn">
                                <svg xmlns="http://www.w3.org/-2000/svg" width="16" height="16" fill="currentColor"
                                    class="bi bi-google" viewBox="0 0 16 16">
                                    <path
                                        d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z" />
                                </svg>
                            </a>
                            <a href="#!" class="social-btn">
                                <svg xmlns="http://www.w3.org/-2000/svg" width="16" height="16" fill="currentColor"
                                    class="bi bi-facebook" viewBox="0 0 16 16">
                                    <path
                                        d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z" />
                                </svg>
                            </a>
                            <a href="#!" class="social-btn">
                                <svg xmlns="http://www.w3.org/-2000/svg" width="16" height="16" fill="currentColor"
                                    class="bi bi-twitter" viewBox="0 0 16 16">
                                    <path
                                        d="M5.026 15c6.038 0 9.341-5.003 9.341-9.334 0-.14 0-.282-.006-.422A6.685 6.685 0 0 0 16 3.542a6.658 6.658 0 0 1-1.889.518 3.301 3.301 0 0 0 1.447-1.817 6.533 6.533 0 0 1-2.087.793A3.286 3.286 0 0 0 7.875 6.03a9.325 9.325 0 0 1-6.767-3.429 3.289 3.289 0 0 0 1.018 4.382A3.323 3.323 0 0 1 .64 6.575v.045a3.288 3.288 0 0 0 2.632 3.218 3.203 3.203 0 0 1-.865.115 3.23 3.23 0 0 1-.614-.057 3.283 3.283 0 0 0 3.067 2.277A6.588 6.588 0 0 1 .78 13.58a6.32 6.32 0 0 1-.78-.045A9.344 9.344 0 0 0 5.026 15z" />
                                </svg>
                            </a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
