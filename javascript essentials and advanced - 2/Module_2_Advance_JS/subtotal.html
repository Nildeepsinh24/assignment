<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module 2 - JS Subtotal Calculator</title>
    <!-- Basic styling to match the table in the assignment image -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .cart-container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #ddd;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product-img {
            width: 50px;
            height: 50px;
            background-color: #f0f0f0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #aaa;
        }

        .product-name {
            font-size: 14px;
            color: #333;
            max-width: 250px;
        }

        .qty-input {
            width: 60px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .price-cell {
            color: #555;
            font-size: 14px;
        }

        .btn-remove {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .btn-remove:hover {
            background-color: #ff4c4c;
        }

        .subtotal-row {
            font-weight: bold;
            font-size: 18px;
            text-align: right;
            padding-right: 15px;
        }

        .total-price {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

    <div class="cart-container">
        <table id="cartTable">
            <thead>
                <tr>
                    <th>Product Info</th>
                    <th>Quantity</th>
                    <th>Price (per unit)</th>
                    <th>Price (subtotal)</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- Item 1 -->
                <tr>
                    <td>
                        <div class="product-info">
                            <div class="product-img">Img</div>
                            <div class="product-name">Fortunata Window Hardware - Decorative Holdbacks - Mocha</div>
                        </div>
                    </td>
                    <td>
                        <input type="number" class="qty-input" value="1" min="1" onchange="calculateSubtotals()">
                    </td>
                    <td class="price-cell">$<span class="unit-price">29.99</span></td>
                    <td class="price-cell">$<span class="item-subtotal">29.99</span></td>
                    <td><button class="btn-remove" onclick="removeItem(this)">Remove</button></td>
                </tr>
                <!-- Item 2 -->
                <tr>
                    <td>
                        <div class="product-info">
                            <div class="product-img">Img</div>
                            <div class="product-name">Wosten Tracks Window Hardware - Clip Rings - Bronze</div>
                        </div>
                    </td>
                    <td>
                        <input type="number" class="qty-input" value="1" min="1" onchange="calculateSubtotals()">
                    </td>
                    <td class="price-cell">$<span class="unit-price">12.99</span></td>
                    <td class="price-cell">$<span class="item-subtotal">12.99</span></td>
                    <td><button class="btn-remove" onclick="removeItem(this)">Remove</button></td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="3" class="subtotal-row">Total Order Value:</td>
                    <td class="total-price">$<span id="grandTotal">42.98</span></td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script>
        // Core Logic for calculating subtotals dynamically in JavaScript
        function calculateSubtotals() {
            // Get all the rows in the table body
            const rows = document.querySelectorAll("#cartTable tbody tr");
            let grandTotal = 0;

            // Loop through each row
            rows.forEach(row => {
                // Get the quantity value (parse as integer)
                const qtyInput = row.querySelector('.qty-input');
                let qty = parseInt(qtyInput.value);

                // Prevent negative or zero quantities
                if (isNaN(qty) || qty < 1) {
                    qtyInput.value = 1;
                    qty = 1;
                }

                // Get the unit price (parse as float)
                const unitPriceStr = row.querySelector('.unit-price').innerText;
                const unitPrice = parseFloat(unitPriceStr);

                // Calculate the item's subtotal
                const itemSubtotal = qty * unitPrice;

                // Update the item's subtotal cell in the DOM, formatted to 2 decimals
                row.querySelector('.item-subtotal').innerText = itemSubtotal.toFixed(2);

                // Add to the overall grand total
                grandTotal += itemSubtotal;
            });

            // Update the Grand Total in the footer
            document.getElementById('grandTotal').innerText = grandTotal.toFixed(2);
        }

        // Function allowing us to delete rows entirely and recalculate logic
        function removeItem(btn) {
            const row = btn.closest('tr');
            row.remove();
            calculateSubtotals(); // Recalculate totals immediately after removal
        }

        // Run calculation once on initial load just to ensure accuracy
        window.onload = calculateSubtotals;
    </script>
</body>

</html>
